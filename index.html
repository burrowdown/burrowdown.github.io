<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <script>
      window.themes = [
        "blush",
        "cathedral",
        "groove",
        "picnic",
        "scape",
        "waves",
      ]
      document.documentElement.dataset.theme = "scape"
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Caprasimo&amp;family=Fraunces:opsz,wght@9..144,400;9..144,700&amp;family=Gochi+Hand&amp;family=Goblin+One&amp;family=Michroma&amp;family=Original+Surfer&amp;family=Outfit:wght@400;500;700&amp;family=Plus+Jakarta+Sans:wght@400;500;700&amp;family=Space+Grotesk:wght@400;500;700&amp;family=Syne:wght@400;500;700&amp;display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="/assets/favicon.ico" sizes="any" />
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles/base.css" />
    <link rel="stylesheet" href="styles/themes/blush.css" />
    <link rel="stylesheet" href="styles/themes/cathedral.css" />
    <link rel="stylesheet" href="styles/themes/groove.css" />
    <link rel="stylesheet" href="styles/themes/picnic.css" />
    <link rel="stylesheet" href="styles/themes/scape.css" />
    <link rel="stylesheet" href="styles/themes/waves.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Danny Burrow</title>
  </head>

  <body>
    <button class="theme-cycle" type="button" aria-label="Show another theme">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path
          d="M17.65 6.35A7.95 7.95 0 0 0 12 4a8 8 0 1 0 7.75 10h-2.1A6 6 0 1 1 12 6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35Z"
        />
      </svg>
    </button>
    <div class="container">
      <div class="flip-card">
        <div class="flip-card-inner">
          <div class="flip-card-front">
            <h1 class="title">Danny<br />Burrow</h1>
            <ul class="roles" aria-label="Roles">
              <li>web dev</li>
              <li>teacher</li>
              <li>coach</li>
              <li>coordinator</li>
            </ul>
            <button
              class="flip-trigger"
              type="button"
              aria-label="Show contact links"
              aria-expanded="false"
            ></button>
          </div>
          <div class="flip-card-back">
            <h2 class="title" aria-hidden="true">Danny<br />Burrow</h2>
            <ul class="contact-links">
              <li>
                <a
                  href="https://github.com/burrowdown"
                  aria-label="Danny Burrow on GitHub"
                >
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path
                      d="M12 2C6.48 2 2 6.58 2 12.23c0 4.52 2.87 8.35 6.84 9.7.5.1.68-.22.68-.49 0-.24-.01-1.05-.01-1.91-2.78.62-3.37-1.21-3.37-1.21-.45-1.18-1.11-1.49-1.11-1.49-.91-.64.07-.62.07-.62 1 .07 1.53 1.06 1.53 1.06.9 1.57 2.35 1.12 2.92.86.09-.66.35-1.12.64-1.37-2.22-.26-4.56-1.14-4.56-5.06 0-1.12.39-2.03 1.03-2.75-.1-.26-.45-1.3.1-2.71 0 0 .84-.28 2.75 1.05A9.35 9.35 0 0 1 12 6.97a9.3 9.3 0 0 1 2.5.35c1.91-1.33 2.75-1.05 2.75-1.05.55 1.41.2 2.45.1 2.71.64.72 1.03 1.63 1.03 2.75 0 3.93-2.34 4.8-4.57 5.05.36.32.68.95.68 1.92 0 1.38-.01 2.49-.01 2.83 0 .27.18.59.69.49A10.25 10.25 0 0 0 22 12.23C22 6.58 17.52 2 12 2Z"
                    />
                  </svg>
                  <span>github</span>
                </a>
              </li>
              <li>
                <a
                  href="https://www.linkedin.com/in/dannyburrow/"
                  aria-label="Danny Burrow on LinkedIn"
                >
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path
                      d="M5.3 7.3A2.3 2.3 0 1 0 5.3 2.7a2.3 2.3 0 0 0 0 4.6ZM3.3 21h4V9h-4v12ZM9.7 9h3.8v1.6h.1c.5-1 1.8-2.1 3.7-2.1 4 0 4.7 2.6 4.7 6V21h-4v-5.8c0-1.4 0-3.2-2-3.2s-2.3 1.5-2.3 3.1V21h-4V9Z"
                    />
                  </svg>
                  <span>linkedin</span>
                </a>
              </li>
              <li>
                <a href="mailto:danny@burrow.dev" aria-label="Email Danny">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path
                      d="M20 4H4a2 2 0 0 0-2 2v12c0 1.1.9 2 2 2h16a2 2 0 0 0 2-2V6c0-1.1-.9-2-2-2Zm0 4-8 5-8-5V6l8 5 8-5v2Z"
                    />
                  </svg>
                  <span>email</span>
                </a>
              </li>
            </ul>
            <button
              class="flip-trigger flip-to-front"
              type="button"
              aria-label="Show front of card"
            ></button>
          </div>
        </div>
      </div>
    </div>
    <script>
      const card = document.querySelector(".flip-card")
      const flipTrigger = card.querySelector(".flip-card-front .flip-trigger")
      const flipToFront = card.querySelector(".flip-to-front")
      const firstContactLink = card.querySelector(".contact-links a")
      const themeCycle = document.querySelector(".theme-cycle")

      flipTrigger.addEventListener("click", () => {
        card.classList.add("is-flipped")
        flipTrigger.setAttribute("aria-expanded", "true")
        firstContactLink.focus()
      })

      flipToFront.addEventListener("click", () => {
        card.classList.remove("is-flipped")
        flipTrigger.setAttribute("aria-expanded", "false")
        flipTrigger.focus()
      })

      const prefersReducedMotion = window.matchMedia(
        "(prefers-reduced-motion: reduce)"
      )

      themeCycle.addEventListener("click", () => {
        if (!prefersReducedMotion.matches) {
          themeCycle
            .querySelector("svg")
            .animate(
              [{ transform: "rotate(0deg)" }, { transform: "rotate(360deg)" }],
              { duration: 500, easing: "ease" }
            )
        }
        // Defer the theme swap so its (heavy) repaint doesn't eat the
        // first frames of the flip
        requestAnimationFrame(() => {
          const current = document.documentElement.dataset.theme
          const others = window.themes.filter((theme) => theme !== current)
          document.documentElement.dataset.theme =
            others[Math.floor(Math.random() * others.length)]
        })
      })
    </script>
  </body>
</html>
